[build]
  command = "echo 'Skipping Vite build for static HTML'"
  publish = "public"

[[edge_functions]]
  path = "/proxy-lando/*"
  function = "proxy"

[[edge_functions]]
  path = "/proxy-assets/*"
  function = "proxy"

[[edge_functions]]
  path = "/proxy-website-files/*"
  function = "proxy"

[[edge_functions]]
  path = "/models/*"
  function = "proxy"

[[edge_functions]]
  path = "/textures/*"
  function = "proxy"

[[edge_functions]]
  path = "/hdri/*"
  function = "proxy"

[[edge_functions]]
  path = "/fonts/*"
  function = "proxy"

[[edge_functions]]
  path = "/dev-js/*"
  function = "proxy"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
